name: Generate & email daily briefing

on:
  # Runs every hour; the job step checks the current Berlin time and skips
  # everything else unless it's ~08:00. Doing it this way (instead of a fixed
  # UTC cron line) means the schedule stays correct across the CEST/CET
  # daylight-saving switch without any manual maintenance twice a year.
  schedule:
    - cron: '0 * * * *'
  # Lets you trigger a run manually from the Actions tab (e.g. to test).
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - name: Check if it's the 08:00 slot (Europe/Berlin)
        id: gate
        run: |
          hour=$(TZ=Europe/Berlin date +%H)
          echo "Aktuelle Berlin-Stunde: $hour"
          if [ "${{ github.event_name }}" != "schedule" ] || [ "$hour" = "08" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Set up Node
        if: steps.gate.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.gate.outputs.run == 'true'
        run: npm ci

      - name: Generate briefing via Gemini API
        if: steps.gate.outputs.run == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run generate

      - name: Send briefing via email
        if: steps.gate.outputs.run == 'true'
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: npm run send-email
